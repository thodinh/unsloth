name: Release Unsloth Studio

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'studio/frontend/**'
      - 'unsloth/**'
      - 'setup.py'
      - 'pyproject.toml'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - name: Build Frontend
        run: |
          cd studio/frontend
          bun install
          bun run build
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Build Python Package
        run: |
          python -m pip install --upgrade pip build wheel
          python -m build
          
      - name: Prepare Release Tag
        id: prep
        run: echo "tag_name=v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prep.outputs.tag_name }}
          name: Unsloth Release ${{ steps.prep.outputs.tag_name }}
          body: |
            ### 🚀 One-Click Installation
            For Linux / WSL / macOS:
            ```bash
            curl -fsSL https://raw.githubusercontent.com/thodinh/unsloth/main/install.sh | bash
            ```
            
            For Windows PowerShell:
            ```powershell
            irm https://raw.githubusercontent.com/thodinh/unsloth/main/install.ps1 | iex
            ```
            
            > **Note:** This bundle includes the pre-compiled Unsloth Studio React frontend. Setup is completely automated.
          files: dist/*.whl
          generate_release_notes: true
          append_body: true
